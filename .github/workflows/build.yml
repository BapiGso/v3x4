name: Build v3x4

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: X64 RELEASE GCC
    runs-on: ubuntu-latest

    steps:
      - name: Checkout v3x4
        uses: actions/checkout@v4
        with:
          path: v3x4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential uuid-dev iasl nasm python3 python3-venv git

      - name: Checkout edk2
        run: |
          git clone --depth 1 https://github.com/tianocore/edk2.git edk2
          git -C edk2 submodule update --init --recursive --depth 1

      - name: Install edk2 Python requirements
        run: |
          python3 -m venv edk2-venv
          . edk2-venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -r edk2/pip-requirements.txt
          echo "$PWD/edk2-venv/bin" >> "$GITHUB_PATH"

      - name: Stage v3x4 module
        run: |
          mkdir -p edk2/MdeModulePkg/v3x4
          cp v3x4/v3x4.c v3x4/v3x4.inf edk2/MdeModulePkg/v3x4/
          python3 - <<'PY'
          from pathlib import Path

          dsc = Path("edk2/MdeModulePkg/MdeModulePkg.dsc")
          text = dsc.read_text()
          component = "  MdeModulePkg/v3x4/v3x4.inf\n"
          if component not in text:
              marker = "[Components]\n"
              text = text.replace(marker, marker + component, 1)
              dsc.write_text(text)
          PY

      - name: Build EFI
        working-directory: edk2
        run: |
          set -o pipefail
          mkdir -p ../artifacts
          (
            set -e
            make -C BaseTools
            . ./edksetup.sh
            if grep -q '^\*_*_GCC5_' Conf/tools_def.txt; then
              tool_chain_tag=GCC5
            else
              tool_chain_tag=GCC
            fi
            echo "Using edk2 toolchain tag: ${tool_chain_tag}"
            build -p MdeModulePkg/MdeModulePkg.dsc -m MdeModulePkg/v3x4/v3x4.inf -a X64 -b RELEASE -t "${tool_chain_tag}"
          ) 2>&1 | tee ../artifacts/build.log
          build_status=${PIPESTATUS[0]}
          if [ "$build_status" -ne 0 ]; then
            echo "::group::Build failure tail"
            tail -n 120 ../artifacts/build.log
            echo "::endgroup::"
            message="$(tail -n 40 ../artifacts/build.log | sed ':a;N;$!ba;s/%/%25/g;s/\r/%0D/g;s/\n/%0A/g')"
            echo "::error title=Build EFI failed::$message"
            exit "$build_status"
          fi
          efi_path="$(find Build -iname 'v3x4.efi' -print -quit)"
          if [ -z "$efi_path" ]; then
            find Build -iname '*.efi' -print | tee ../artifacts/efi-files.txt
            echo "::error title=Build EFI failed::v3x4.efi was not produced"
            exit 1
          fi
          cp "$efi_path" ../artifacts/v3x4.efi
          gen_sec="$PWD/BaseTools/BinWrappers/PosixLike/GenSec"
          gen_ffs="$PWD/BaseTools/BinWrappers/PosixLike/GenFfs"
          if [ -x "$gen_sec" ] && [ -x "$gen_ffs" ]; then
            if "$gen_sec" -s EFI_SECTION_PE32 -o ../artifacts/v3x4.pe32 ../artifacts/v3x4.efi && \
               "$gen_ffs" -t EFI_FV_FILETYPE_DRIVER -g 20E8A16C-8C70-4702-8698-27AFF7281EB9 -o ../artifacts/v3x4.ffs -i ../artifacts/v3x4.pe32; then
              rm -f ../artifacts/v3x4.pe32
            else
              echo "::warning::Optional GenFfs step failed; EFI artifact is still available"
              rm -f ../artifacts/v3x4.pe32 ../artifacts/v3x4.ffs
            fi
          else
            echo "::warning::GenSec/GenFfs wrappers not found; skipping optional FFS artifact"
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v3x4-X64-RELEASE-GCC
          path: artifacts/*
          if-no-files-found: warn

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/v3x4.*
          fail_on_unmatched_files: true
          generate_release_notes: true
