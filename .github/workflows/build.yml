name: Build v3x4

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: X64 RELEASE GCC5
    runs-on: ubuntu-latest

    steps:
      - name: Checkout v3x4
        uses: actions/checkout@v4
        with:
          path: v3x4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential uuid-dev iasl nasm python3 python3-venv git

      - name: Checkout edk2
        run: |
          git clone --depth 1 https://github.com/tianocore/edk2.git edk2
          git -C edk2 submodule update --init --recursive --depth 1

      - name: Install edk2 Python requirements
        run: |
          python3 -m venv edk2-venv
          . edk2-venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -r edk2/pip-requirements.txt
          echo "$PWD/edk2-venv/bin" >> "$GITHUB_PATH"

      - name: Stage v3x4 module
        run: |
          mkdir -p edk2/MdeModulePkg/v3x4
          cp v3x4/v3x4.c v3x4/v3x4.inf edk2/MdeModulePkg/v3x4/
          python3 - <<'PY'
          from pathlib import Path

          dsc = Path("edk2/MdeModulePkg/MdeModulePkg.dsc")
          text = dsc.read_text()
          component = "  MdeModulePkg/v3x4/v3x4.inf\n"
          if component not in text:
              marker = "[Components]\n"
              text = text.replace(marker, marker + component, 1)
              dsc.write_text(text)
          PY

      - name: Build EFI
        working-directory: edk2
        run: |
          make -C BaseTools
          . ./edksetup.sh
          build -p MdeModulePkg/MdeModulePkg.dsc -m MdeModulePkg/v3x4/v3x4.inf -a X64 -b RELEASE -t GCC5
          mkdir -p ../artifacts
          efi_path="$(find Build -path '*OUTPUT/v3x4.efi' -print -quit)"
          if [ -z "$efi_path" ]; then
            echo "v3x4.efi was not produced"
            exit 1
          fi
          cp "$efi_path" ../artifacts/v3x4.efi
          if command -v GenSec >/dev/null 2>&1 && command -v GenFfs >/dev/null 2>&1; then
            if GenSec -s EFI_SECTION_PE32 -o ../artifacts/v3x4.pe32 ../artifacts/v3x4.efi && \
               GenFfs -t EFI_FV_FILETYPE_DRIVER -g 20E8A16C-8C70-4702-8698-27AFF7281EB9 -o ../artifacts/v3x4.ffs -i ../artifacts/v3x4.pe32; then
              rm -f ../artifacts/v3x4.pe32
            else
              echo "::warning::Optional GenFfs step failed; EFI artifact is still available"
              rm -f ../artifacts/v3x4.pe32 ../artifacts/v3x4.ffs
            fi
          else
            echo "::warning::GenSec/GenFfs not found; skipping optional FFS artifact"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: v3x4-X64-RELEASE-GCC5
          path: artifacts/*
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          fail_on_unmatched_files: true
          generate_release_notes: true
